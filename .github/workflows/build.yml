name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    # =========================
    # SYSTEM DEPENDENCIES
    # =========================
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip wget openjdk-17-jdk python3-pip \
        autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
        libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev

    # =========================
    # PYTHON DEPENDENCIES
    # =========================
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    # =========================
    # CLEAN CACHE
    # =========================
    - name: Remove broken Buildozer SDK
      run: |
        rm -rf ~/.buildozer

    # =========================
    # ANDROID SDK
    # =========================
    - name: Install Android SDK
      run: |
        mkdir -p $HOME/android-sdk/cmdline-tools
        cd $HOME/android-sdk/cmdline-tools

        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip commandlinetools-linux-*.zip
        mv cmdline-tools latest

        echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
        echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
        echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH

    # =========================
    # INSTALL SDK COMPONENTS (FIX AIDL)
    # =========================
    - name: Install SDK packages
      run: |
        yes | sdkmanager --sdk_root=$HOME/android-sdk --licenses

        sdkmanager --sdk_root=$HOME/android-sdk \
          "platform-tools" \
          "platforms;android-34" \
          "build-tools;34.0.0" \
          "cmdline-tools;latest"

    # =========================
    # BUILD APK
    # =========================
    - name: Build APK
      run: |
        export ANDROIDSDK=$HOME/android-sdk
        export ANDROID_HOME=$HOME/android-sdk
        export ANDROID_SDK_ROOT=$HOME/android-sdk

        buildozer -v android debug
